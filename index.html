<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的在线地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html,body{margin:0;padding:0;height:100%;}
        #map{width:100%;height:100%;}
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 地图中心点：无锡，缩放等级12
        const map = L.map('map').setView([31.57, 120.29], 12);

        // 高德矢量底图 ltype=4 彻底隐藏所有地名、道路文字
        L.tileLayer('https://webrd02.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&ltype=4&x={x}&y={y}&z={z}',{
            attribution:'&copy; 高德地图'
        }).addTo(map);

        // 添加点位标记
        L.marker([31.57, 120.29]).addTo(map)
            .bindPopup("自定义点位备注").openPopup();
    </script>
</body>
</html>
